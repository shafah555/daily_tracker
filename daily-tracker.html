<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B3B2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Tracker">
<title>Daily Tracker — ডেইলি ট্র্যাকার</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Hind+Siliguri:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --green-950:#0B3B2E;
  --green-800:#0F4C3C;
  --green-700:#146356;
  --green-600:#1B7A63;
  --green-500:#1F8A6F;
  --green-100:#DCEDE4;
  --gold-500:#C9A227;
  --gold-300:#E4C766;
  --gold-100:#F6ECC8;
  --cream-50:#FAF6EC;
  --cream-100:#F2ECDD;
  --ink-900:#1B2420;
  --ink-600:#4B5750;
  --ink-400:#7C877F;
  --danger:#B3413A;
  --danger-bg:#F6E3E0;
  --ok:#2F7A4F;
  --radius-lg:22px;
  --radius-md:14px;
  --radius-sm:8px;
  --shadow-1:0 2px 10px rgba(11,59,46,0.08);
  --shadow-2:0 10px 30px rgba(11,59,46,0.14);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--cream-50);
  color:var(--ink-900);
  font-family:'Hind Siliguri',-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;
}
h1,h2,h3,.display{font-family:'Amiri',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--gold-300);}

/* ---------- layout shell ---------- */
#app{min-height:100vh;}
.shell{display:flex;min-height:100vh;}
.sidebar{
  width:240px;flex-shrink:0;
  background:linear-gradient(180deg,var(--green-950),var(--green-800));
  color:var(--cream-50);
  display:flex;flex-direction:column;
  padding:22px 16px;
  position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:0 6px 20px 6px;border-bottom:1px solid rgba(250,246,236,0.14);margin-bottom:16px;}
.brand-mark{width:34px;height:34px;flex-shrink:0;}
.brand-text .t1{font-family:'Amiri',serif;font-size:19px;line-height:1.1;font-weight:700;color:var(--gold-300);}
.brand-text .t2{font-size:11px;letter-spacing:0.08em;color:rgba(250,246,236,0.65);text-transform:uppercase;}
nav.navlist{display:flex;flex-direction:column;gap:2px;flex:1;}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:10px;
  color:rgba(250,246,236,0.82);
  font-size:14.5px;font-weight:500;
  text-decoration:none;
  transition:background .15s ease, color .15s ease;
}
.nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.9;}
.nav-item:hover{background:rgba(250,246,236,0.08);color:#fff;}
.nav-item.active{background:rgba(228,199,102,0.16);color:var(--gold-300);}
.nav-section-label{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,246,236,0.4);margin:14px 10px 4px;}
.sidebar-foot{border-top:1px solid rgba(250,246,236,0.14);padding-top:12px;margin-top:10px;}
.user-chip{display:flex;align-items:center;gap:9px;padding:8px 8px;border-radius:10px;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold-500);color:var(--green-950);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.user-name{font-size:13.5px;font-weight:600;}
.user-sub{font-size:11px;color:rgba(250,246,236,0.55);}
.logout-btn{background:none;border:none;color:rgba(250,246,236,0.55);font-size:12px;margin-top:6px;padding:6px 8px;border-radius:8px;width:100%;text-align:left;}
.logout-btn:hover{background:rgba(250,246,236,0.08);color:#fff;}

.main{flex:1;min-width:0;padding:28px 34px 60px;}
.topbar{display:none;}

.page-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:22px;}
.page-title{font-size:26px;margin:0 0 4px;color:var(--green-950);}
.page-sub{color:var(--ink-600);font-size:13.5px;margin:0;}

.card{background:#fff;border-radius:var(--radius-md);padding:20px;box-shadow:var(--shadow-1);border:1px solid rgba(11,59,46,0.06);}
.grid{display:grid;gap:16px;}
.grid.cols-2{grid-template-columns:1fr 1fr;}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:1000px){.grid.cols-3,.grid.cols-4{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr;}}

/* ---------- signature mihrab hero ---------- */
.mihrab{
  position:relative;overflow:hidden;
  background:radial-gradient(120% 140% at 50% -10%, var(--green-700), var(--green-950) 70%);
  border-radius:36px 36px 18px 18px;
  color:var(--cream-50);
  padding:30px 28px 26px;
  box-shadow:var(--shadow-2);
}
.mihrab::before{
  content:"";position:absolute;inset:0;opacity:.16;pointer-events:none;
  background-image:
   radial-gradient(circle at 20% 20%, var(--gold-300) 0 2px, transparent 2px),
   radial-gradient(circle at 60% 10%, var(--gold-300) 0 2px, transparent 2px),
   radial-gradient(circle at 85% 35%, var(--gold-300) 0 2px, transparent 2px),
   radial-gradient(circle at 10% 60%, var(--gold-300) 0 2px, transparent 2px),
   radial-gradient(circle at 40% 80%, var(--gold-300) 0 2px, transparent 2px),
   radial-gradient(circle at 75% 75%, var(--gold-300) 0 2px, transparent 2px);
  background-size:140px 140px;
}
.mihrab-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;flex-wrap:wrap;gap:10px;}
.mihrab-date .greg{font-size:13px;color:rgba(250,246,236,.8);}
.mihrab-date .hijri{font-family:'Amiri',serif;font-size:16px;color:var(--gold-300);margin-top:2px;}
.city-pick select{background:rgba(250,246,236,.1);color:#fff;border:1px solid rgba(250,246,236,.25);border-radius:8px;padding:6px 8px;font-size:12.5px;}
.city-pick select option{color:#111;}

.mihrab-next{text-align:center;margin:18px 0 6px;position:relative;}
.mihrab-next .label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:rgba(250,246,236,.65);}
.mihrab-next .name{font-family:'Amiri',serif;font-size:30px;color:var(--gold-300);margin:2px 0;}
.mihrab-next .countdown{font-family:'IBM Plex Mono',monospace;font-size:36px;font-weight:600;letter-spacing:.02em;}
.mihrab-next .at{font-size:12.5px;color:rgba(250,246,236,.7);}

.prayer-strip{display:flex;justify-content:space-between;gap:8px;margin-top:20px;position:relative;flex-wrap:wrap;}
.prayer-pill{flex:1;min-width:78px;text-align:center;background:rgba(250,246,236,.08);border:1px solid rgba(250,246,236,.15);border-radius:14px;padding:10px 6px;}
.prayer-pill.now{background:rgba(228,199,102,.22);border-color:var(--gold-300);}
.prayer-pill .pn{font-size:11.5px;color:rgba(250,246,236,.7);}
.prayer-pill .pt{font-family:'IBM Plex Mono',monospace;font-size:15px;margin-top:2px;}

/* tasbih streak beads */
.tasbih{display:flex;gap:8px;align-items:center;margin-top:18px;position:relative;flex-wrap:wrap;}
.bead{width:26px;height:26px;border-radius:50%;background:rgba(250,246,236,.12);border:1px solid rgba(250,246,236,.25);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(250,246,236,.6);}
.bead.full{background:var(--gold-500);border-color:var(--gold-300);color:var(--green-950);font-weight:700;}
.bead.half{background:rgba(228,199,102,.45);border-color:var(--gold-300);}
.tasbih-label{font-size:12px;color:rgba(250,246,236,.7);margin-left:4px;}

/* stat cards */
.stat-card{background:#fff;border-radius:var(--radius-md);padding:16px 18px;box-shadow:var(--shadow-1);border:1px solid rgba(11,59,46,0.06);}
.stat-card .k{font-size:11.5px;color:var(--ink-600);text-transform:uppercase;letter-spacing:.06em;}
.stat-card .v{font-family:'IBM Plex Mono',monospace;font-size:26px;color:var(--green-800);margin-top:4px;}
.stat-card .v small{font-size:13px;font-family:'Hind Siliguri',sans-serif;color:var(--ink-400);}
.stat-card .d{font-size:12px;margin-top:4px;}
.stat-card .d.up{color:var(--ok);}
.stat-card .d.down{color:var(--danger);}

/* section title */
.section-title{display:flex;align-items:center;gap:8px;margin:26px 0 12px;}
.section-title h3{margin:0;font-size:16px;color:var(--green-800);}
.section-title .line{flex:1;height:1px;background:linear-gradient(90deg,rgba(11,59,46,.18),transparent);}

/* forms */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:12.5px;font-weight:600;color:var(--ink-600);}
.field input[type=text],.field input[type=number],.field input[type=password],.field input[type=time],.field input[type=date],.field select,.field textarea{
  border:1px solid rgba(11,59,46,.16);border-radius:10px;padding:9px 11px;font-size:14px;background:var(--cream-50);color:var(--ink-900);
}
.field textarea{resize:vertical;min-height:64px;}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--green-500);outline-offset:1px;background:#fff;}
.btn{border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:7px;}
.btn-primary{background:var(--green-700);color:#fff;}
.btn-primary:hover{background:var(--green-800);}
.btn-gold{background:var(--gold-500);color:var(--green-950);}
.btn-gold:hover{background:var(--gold-300);}
.btn-ghost{background:transparent;border:1px solid rgba(11,59,46,.2);color:var(--green-800);}
.btn-ghost:hover{background:var(--green-100);}
.btn-danger{background:var(--danger-bg);color:var(--danger);}
.btn-danger:hover{background:#eecdc8;}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px;}
.btn:disabled{opacity:.5;cursor:default;}

/* prayer checklist */
.prayer-check-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px dashed rgba(11,59,46,.12);}
.prayer-check-row:last-child{border-bottom:none;}
.prayer-check-row .pname{font-weight:600;font-size:14.5px;}
.prayer-check-row .parab{font-size:12px;color:var(--ink-400);margin-left:6px;}
.toggle{position:relative;width:42px;height:24px;border-radius:20px;background:#dfe6e2;flex-shrink:0;border:none;}
.toggle.on{background:var(--green-600);}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s ease;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.toggle.on::after{left:21px;}
.mini-tag{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--green-100);color:var(--green-800);font-weight:600;}
.mini-tag.off{background:#eee;color:#999;}

/* dua checklist */
.dua-list{display:flex;flex-direction:column;gap:10px;}
.dua-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:var(--cream-100);}
.dua-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--green-600);}
.dua-row .name{font-size:13.5px;flex:1;}
.dua-row button{background:none;border:none;color:var(--ink-400);font-size:15px;}

.dua-row-full{padding:12px 14px;border-radius:12px;background:var(--cream-100);border:1px solid rgba(11,59,46,.08);}
.dua-row-head{display:flex;align-items:center;gap:10px;cursor:pointer;}
.dua-row-head input[type=checkbox]{width:18px;height:18px;accent-color:var(--green-600);flex-shrink:0;}
.dua-row-head .name{font-size:14px;font-weight:600;color:var(--green-800);}
.arabic-text{direction:rtl;text-align:right;font-family:'Amiri',serif;font-size:22px;line-height:2.1;color:var(--green-950);margin-top:10px;padding:10px 4px 2px;border-top:1px dashed rgba(11,59,46,.15);}
.dua-meaning{font-size:13px;color:var(--ink-600);margin-top:6px;line-height:1.6;}

/* chip list manager (settings customization) */
.chip-wrap{display:flex;flex-wrap:wrap;gap:8px;min-height:20px;}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--green-100);color:var(--green-800);font-size:13px;font-weight:600;padding:6px 8px 6px 12px;border-radius:20px;}
.chip button{background:rgba(11,59,46,.12);border:none;color:var(--green-800);width:18px;height:18px;border-radius:50%;font-size:11px;line-height:1;cursor:pointer;}
.chip button:hover{background:var(--danger);color:#fff;}

/* dua library page */
.dua-lib-card{background:#fff;border-radius:var(--radius-md);padding:16px 18px;box-shadow:var(--shadow-1);border:1px solid rgba(11,59,46,.06);margin-bottom:14px;}
.dua-lib-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.dua-lib-head h4{margin:0;font-size:15px;color:var(--green-800);}

/* todo */
.todo-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px dashed rgba(11,59,46,.12);}
.todo-row:last-child{border-bottom:none;}
.todo-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--green-600);}
.todo-row .txt{flex:1;font-size:14px;}
.todo-row .txt.done{text-decoration:line-through;color:var(--ink-400);}
.todo-row .del{background:none;border:none;color:var(--danger);font-size:13px;}
.add-inline{display:flex;gap:8px;margin-top:12px;}
.add-inline input{flex:1;}

/* reminders */
.reminder-row{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px dashed rgba(11,59,46,.12);}
.reminder-row:last-child{border-bottom:none;}
.reminder-row .rt{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;color:var(--green-800);width:64px;}
.reminder-row .rtxt{flex:1;font-size:14px;}
.reminder-row .rmeta{font-size:11.5px;color:var(--ink-400);}

/* tables */
table.report{width:100%;border-collapse:collapse;font-size:13px;}
table.report th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-600);padding:8px 10px;border-bottom:2px solid rgba(11,59,46,.14);}
table.report td{padding:8px 10px;border-bottom:1px solid rgba(11,59,46,.08);}
table.report tr:hover td{background:var(--cream-100);}
.score-pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.score-pill.hi{background:#DCEDE4;color:var(--ok);}
.score-pill.mid{background:var(--gold-100);color:#8a6d0f;}
.score-pill.lo{background:var(--danger-bg);color:var(--danger);}

/* bar chart */
.barchart{display:flex;align-items:flex-end;gap:4px;height:150px;padding:6px 2px 0;}
.barchart .bar{flex:1;background:linear-gradient(180deg,var(--green-500),var(--green-700));border-radius:4px 4px 0 0;min-height:2px;position:relative;}
.barchart .bar:hover{background:linear-gradient(180deg,var(--gold-500),var(--gold-500));}
.barchart .lbl{display:flex;gap:4px;margin-top:6px;}
.barchart .lbl span{flex:1;text-align:center;font-size:9.5px;color:var(--ink-400);}

.meter{height:10px;border-radius:6px;background:var(--cream-100);overflow:hidden;margin-top:6px;}
.meter i{display:block;height:100%;background:linear-gradient(90deg,var(--green-500),var(--gold-500));border-radius:6px;}

.compare-wrap{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
@media(max-width:800px){.compare-wrap{grid-template-columns:1fr;}}
.compare-col h4{margin:0 0 10px;color:var(--green-800);font-size:14px;}
.compare-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed rgba(11,59,46,.12);font-size:13.5px;}
.delta{font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px;}
.delta.up{color:var(--ok);background:#DCEDE4;}
.delta.down{color:var(--danger);background:var(--danger-bg);}
.delta.flat{color:var(--ink-400);background:var(--cream-100);}

.empty{text-align:center;color:var(--ink-400);font-size:13.5px;padding:30px 10px;}
.pill-toggle{display:flex;gap:6px;background:var(--cream-100);padding:4px;border-radius:12px;width:fit-content;}
.pill-toggle button{background:none;border:none;padding:7px 14px;font-size:13px;border-radius:9px;color:var(--ink-600);font-weight:600;}
.pill-toggle button.active{background:#fff;color:var(--green-800);box-shadow:0 1px 4px rgba(0,0,0,.1);}

.toast-wrap{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:999;}
.toast{background:var(--green-950);color:#fff;padding:11px 16px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow-2);max-width:280px;animation:slidein .2s ease;}
.toast.err{background:var(--danger);}
@keyframes slidein{from{transform:translateX(20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* auth screen */
.auth-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 50% 0%, var(--green-700), var(--green-950) 65%);padding:20px;}
.auth-card{width:100%;max-width:380px;background:#fff;border-radius:24px;padding:30px 28px;box-shadow:var(--shadow-2);}
.auth-brand{text-align:center;margin-bottom:18px;}
.auth-brand .mark{width:46px;height:46px;margin:0 auto 8px;}
.auth-brand h1{font-size:22px;margin:0;color:var(--green-950);}
.auth-brand p{margin:4px 0 0;color:var(--ink-600);font-size:12.5px;}
.auth-tabs{display:flex;background:var(--cream-100);border-radius:12px;padding:4px;margin-bottom:18px;}
.auth-tabs button{flex:1;background:none;border:none;padding:9px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--ink-600);}
.auth-tabs button.active{background:#fff;color:var(--green-800);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.auth-note{font-size:11.5px;color:var(--ink-400);margin-top:10px;line-height:1.5;}
.auth-error{background:var(--danger-bg);color:var(--danger);font-size:12.5px;padding:9px 11px;border-radius:8px;margin-bottom:12px;}

/* mobile nav */
@media(max-width:880px){
  .shell{flex-direction:column;}
  .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;height:auto;flex-direction:row;padding:8px 6px;align-items:center;z-index:50;overflow-x:auto;}
  .brand,.sidebar-foot,.nav-section-label{display:none;}
  nav.navlist{flex-direction:row;flex:1;justify-content:space-between;}
  .nav-item{flex-direction:column;font-size:9.5px;gap:3px;padding:6px 4px;text-align:center;}
  .nav-item span.lbl{max-width:52px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .main{padding:18px 16px 90px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .topbar .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold-500);color:var(--green-950);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.error('Service worker registration failed:', err));
  });
}
</script>

<script>
(function(){
"use strict";

/* ===================== CONSTANTS ===================== */
const PRAYERS = [
  {key:"fajr",  bn:"ফজর",   en:"Fajr",    ar:"الفجر"},
  {key:"dhuhr", bn:"যোহর",  en:"Dhuhr",   ar:"الظهر"},
  {key:"asr",   bn:"আসর",   en:"Asr",     ar:"العصر"},
  {key:"maghrib",bn:"মাগরিব",en:"Maghrib",ar:"المغرب"},
  {key:"isha",  bn:"এশা",   en:"Isha",    ar:"العشاء"}
];
const CITIES = ["Dhaka","Chittagong","Khulna","Rajshahi","Sylhet","Barisal","Rangpur","Mymensingh","Cumilla","Narayanganj","Gazipur"];
/* Each entry: bn = Bangla title, ar = Arabic text, meaning = Bangla meaning/translation.
   Compiled from well-known daily masnoon duas (e.g. Hisnul Muslim). Wording is provided

function getSettings(u){
  const s = LS.get(setKey(u), {city:"Dhaka", duas: DEFAULT_DUA_IDS.slice(), customDuas:[], quranRoutine:[], hadithSources:[], literatureTitles:[], studySubjects:[], commonTodos:[]});
  if(!s.duas) s.duas = DEFAULT_DUA_IDS.slice();
  if(!s.customDuas) s.customDuas = [];
  if(!s.quranRoutine) s.quranRoutine = [];
  if(!s.hadithSources) s.hadithSources = ["রিয়াদুস সালেহীন","বুলুগুল মারাম","৪০ হাদিস (নববী)","সহীহ বুখারী","সহীহ মুসলিম"];
  if(!s.literatureTitles) s.literatureTitles = ["সীরাতুন্নবী","তাফসীর ইবনে কাসীর","ফিকহুস সুন্নাহ"];
  if(!s.studySubjects) s.studySubjects = ["আরবি ভাষা","ইসলামিক ইতিহাস","ফিকহ"];
  if(!s.commonTodos) s.commonTodos = ["তাহাজ্জুদ নামাজ","মা-বাবাকে ফোন করা","সাদাকাহ প্রদান","কোরআন মুখস্থ পুনরাবৃত্তি","জুমার প্রস্তুতি"];
  // migrate any legacy plain-text dua entries (from older versions) into customDuas
  s.duas = s.duas.map(entry=>{
    if(DUA_LIBRARY[entry]) return entry;
    if(s.customDuas.some(c=>c.id===entry)) return entry;
    const id = "custom_"+Math.random().toString(36).slice(2,9);
    s.customDuas.push({id, bn:String(entry), ar:"", meaning:""});
    return id;
  });
  return s;
}
function saveSettings(u, s){ LS.set(setKey(u), s); }

/* ===================== CRYPTO (local-only auth) ===================== */
function bufToHex(buf){ return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join(""); }
async function hashPass(pass, salt){
  const enc = new TextEncoder().encode(salt+":"+pass);
  const digest = await crypto.subtle.digest("SHA-256", enc);
  return bufToHex(digest);
}
function randomSalt(){ return bufToHex(crypto.getRandomValues(new Uint8Array(16))); }

/* ===================== DATE HELPERS ===================== */
function pad2(n){ return String(n).padStart(2,"0"); }
function isoDate(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function todayISO(){ return isoDate(new Date()); }
function parseISO(s){ const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function addDays(iso, n){ const d = parseISO(iso); d.setDate(d.getDate()+n); return isoDate(d); }
function fmtDateHuman(iso){ const d = parseISO(iso); return WEEKDAY_BN[d.getDay()]+", "+d.getDate()+" "+MONTH_NAMES[d.getMonth()]+" "+d.getFullYear(); }
function last7(){ const arr=[]; for(let i=6;i>=0;i--) arr.push(addDays(todayISO(), -i)); return arr; }
function last30(){ const arr=[]; for(let i=29;i>=0;i--) arr.push(addDays(todayISO(), -i)); return arr; }
function last12Months(){
  const arr=[]; const d = new Date();
  for(let i=11;i>=0;i--){
    const dt = new Date(d.getFullYear(), d.getMonth()-i, 1);
    arr.push({y:dt.getFullYear(), m:dt.getMonth(), label:MONTH_NAMES[dt.getMonth()]+" "+String(dt.getFullYear()).slice(2)});
  }
  return arr;
}

/* ===================== RECORD MODEL ===================== */
function emptyRecord(){
  return {
    prayers:{fajr:{done:false,jamaat:false},dhuhr:{done:false,jamaat:false},asr:{done:false,jamaat:false},maghrib:{done:false,jamaat:false},isha:{done:false,jamaat:false}},
    quran:{pages:0, minutes:0, routineDone:{}},
    hadith:{count:0, topic:""},
    literature:{minutes:0, title:""},
    study:{minutes:0, subject:""},
    duas:{items:{}, count:0},
    notes:""
  };
}
function getRecordFor(u, iso){
  const all = getRecords(u);
  return all[iso] ? mergeRecord(all[iso]) : emptyRecord();
}
function mergeRecord(r){
  const base = emptyRecord();
  return {
    prayers: Object.assign(base.prayers, r.prayers||{}),
    quran: Object.assign(base.quran, r.quran||{}),
    hadith: Object.assign(base.hadith, r.hadith||{}),
    literature: Object.assign(base.literature, r.literature||{}),
    study: Object.assign(base.study, r.study||{}),
    duas: Object.assign(base.duas, r.duas||{}),
    notes: r.notes||""
  };
}
function setRecordFor(u, iso, rec){
  const all = getRecords(u);
  all[iso] = rec;
  saveRecords(u, all);
}

function prayerScore(rec){
  const done = PRAYERS.filter(p=>rec.prayers[p.key] && rec.prayers[p.key].done).length;
  return (done/5)*100;
}
function otherScore(rec){
  let n=0;
  if((rec.quran.pages||0)>0 || (rec.quran.minutes||0)>0) n++;
  if((rec.hadith.count||0)>0) n++;
  if((rec.literature.minutes||0)>0) n++;
  if((rec.study.minutes||0)>0) n++;
  if((rec.duas.count||0)>0) n++;
  return (n/5)*100;
}
function amolScore(rec){ return prayerScore(rec)*0.6 + otherScore(rec)*0.4; }
function hasAnyData(rec){
  return prayerScore(rec)>0 || otherScore(rec)>0 || (rec.notes && rec.notes.trim().length>0);
}

/* ===================== TOAST ===================== */
function toast(msg, isErr){
  const wrap = document.getElementById("toastWrap");
  const el = document.createElement("div");
  el.className = "toast"+(isErr?" err":"");
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(()=>el.remove(),300); }, 2600);
}

function migrateGuestDataTo(username){
  const gRecords = getRecords(GUEST_USER);
  const gTodos = getTodos(GUEST_USER);
  const gRems = getReminders(GUEST_USER);
  const gSettings = LS.get(setKey(GUEST_USER), null);
  let moved = false;
  if(Object.keys(gRecords).length){ saveRecords(username, gRecords); moved = true; }
  if(gTodos.length){ saveTodos(username, gTodos); moved = true; }
  if(gRems.length){ saveReminders(username, gRems); moved = true; }
  if(gSettings){ saveSettings(username, gSettings); moved = true; }
  return moved;
}
async function doLogin(){
  const u = document.getElementById("fUser").value.trim().toLowerCase();
  const p = document.getElementById("fPass").value;
  if(!u||!p){ renderAuth("ইউজারনেম ও পাসওয়ার্ড দিন।"); return; }
  const db = usersDB();
  const rec = db[u];
  if(!rec){ renderAuth("এই ইউজারনেমে কোনো অ্যাকাউন্ট নেই।"); return; }
  const h = await hashPass(p, rec.salt);
  if(h !== rec.passHash){ renderAuth("পাসওয়ার্ড ভুল হয়েছে।"); return; }
  setSession(u);
  location.hash = "#/dashboard";
  render();
  toast("স্বাগতম, "+rec.name+"!");
}
async function doSignup(){
  const name = document.getElementById("fName").value.trim();
  const u = document.getElementById("fUser").value.trim().toLowerCase();
  const p = document.getElementById("fPass").value;
  const p2 = document.getElementById("fPass2").value;
  if(!name||!u||!p){ renderAuth("সব ঘর পূরণ করুন।"); return; }
  if(!/^[a-z0-9_.]{3,20}$/.test(u)){ renderAuth("ইউজারনেম: ৩-২০ অক্ষর, ছোট হাতের ইংরেজি/সংখ্যা/আন্ডারস্কোর।"); return; }
  if(p.length<4){ renderAuth("পাসওয়ার্ড কমপক্ষে ৪ অক্ষরের হতে হবে।"); return; }
  if(p!==p2){ renderAuth("পাসওয়ার্ড মিলছে না।"); return; }
  const db = usersDB();
  if(db[u]){ renderAuth("এই ইউজারনেম আগে থেকেই আছে।"); return; }
  const salt = randomSalt();
  const passHash = await hashPass(p, salt);
  db[u] = {name, salt, passHash, createdAt: todayISO()};
  saveUsersDB(db);
  saveSettings(u, {city:"Dhaka", duas: DEFAULT_DUA_IDS.slice(), customDuas:[], quranRoutine:[]});
  const moved = migrateGuestDataTo(u);
  setSession(u);
  location.hash = "#/dashboard";
  render();
  toast(moved ? "অ্যাকাউন্ট তৈরি হয়েছে ও Guest তথ্য স্থানান্তরিত হয়েছে। স্বাগতম, "+name+"!" : "অ্যাকাউন্ট তৈরি হয়েছে। স্বাগতম, "+name+"!");
}

/* ===================== PRAYER TIMES ===================== */
const prayerTimesCache = {}; // memory cache this session
async function fetchPrayerTimes(city, iso){
  const ck = city+"|"+iso;
  if(prayerTimesCache[ck]) return prayerTimesCache[ck];
  const lsKey = "amol_ptimes_"+ck;
  const cached = LS.get(lsKey, null);
  if(cached){ prayerTimesCache[ck] = cached; return cached; }
  try{
    const d = parseISO(iso);
    const dateStr = pad2(d.getDate())+"-"+pad2(d.getMonth()+1)+"-"+d.getFullYear();
    const url = `https://api.aladhan.com/v1/timingsByCity/${dateStr}?city=${encodeURIComponent(city)}&country=Bangladesh&method=1`;
    const res = await fetch(url);
    if(!res.ok) throw new Error("bad response");
    const data = await res.json();
    const t = data.data.timings;
    const hijri = data.data.date.hijri;
    const result = {
      fajr:t.Fajr, dhuhr:t.Dhuhr, asr:t.Asr, maghrib:t.Maghrib, isha:t.Isha,
      hijri: `${hijri.day} ${hijri.month.en} ${hijri.year} AH`
    };
    LS.set(lsKey, result);
    prayerTimesCache[ck] = result;
    return result;
  }catch(e){
    return null;
  }
}
function timeStrToDate(iso, hm){
  // hm like "05:12" possibly with " (BST)" suffix from API - strip extras
  const clean = (hm||"").split(" ")[0];
  const [h,m] = clean.split(":").map(Number);
  const d = parseISO(iso);
  d.setHours(h||0, m||0, 0, 0);
  return d;
}

    const times = await fetchPrayerTimes(settings.city, iso);
    if(!times){
      document.getElementById("hijriLine").textContent = "সময় লোড করা যায়নি — ইন্টারনেট সংযোগ পরীক্ষা করুন";
      document.getElementById("nextPrayerBlock").querySelector(".name").textContent = "অনুপলব্ধ";
      document.getElementById("prayerStrip").innerHTML = `<div class="empty" style="color:rgba(250,246,236,.7)">নামাজের সময় লোড করা যায়নি।</div>`;
      return;
    }
    document.getElementById("hijriLine").textContent = times.hijri;
    document.getElementById("prayerStrip").innerHTML = PRAYERS.map(p=>{
      return `<div class="prayer-pill" data-k="${p.key}"><div class="pn">${p.bn}</div><div class="pt">${(times[p.key]||"").split(" ")[0]}</div></div>`;
    }).join("");
    startCountdown(times);
  }

  let countdownTimer = null;
  function startCountdown(times){
    if(countdownTimer) clearInterval(countdownTimer);
    function tick(){
      const now = new Date();
      const upcoming = PRAYERS.map(p=>({key:p.key, bn:p.bn, en:p.en, t: timeStrToDate(iso, times[p.key])}))
        .filter(p=>p.t > now)
        .sort((a,b)=>a.t-b.t);
      let target = upcoming[0];
      let labelExtra = "";
      if(!target){
        // next is tomorrow's fajr - approximate using same time
        const t = timeStrToDate(addDays(iso,1), times.fajr);
        target = {key:"fajr", bn:"ফজর", en:"Fajr", t};
        labelExtra = " (আগামীকাল)";
      }
      const diff = Math.max(0, target.t - now);
      const h = Math.floor(diff/3600000);
      const m = Math.floor((diff%3600000)/60000);
      const s = Math.floor((diff%60000)/1000);
      const block = document.getElementById("nextPrayerBlock");
      if(block){
        block.querySelector(".name").textContent = target.bn + " ("+target.en+")"+labelExtra;
        block.querySelector(".countdown").textContent = pad2(h)+":"+pad2(m)+":"+pad2(s);
        block.querySelector(".at") ? null : null;
      }
      document.querySelectorAll(".prayer-pill").forEach(el=>{
        el.classList.toggle("now", el.dataset.k===target.key && !labelExtra);
      });
    }
    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  loadPrayerBlock();
}

function renderQuranRoutine(root, user){
  const settings = getSettings(user);

  draw();

  function draw(){
    root.innerHTML = `
      <div class="page-head">

        </div>

        <div class="dua-meaning">আয়াত সংখ্যা: ${s.ayahs}</div>
        <button class="btn btn-sm ${inRoutine?'btn-primary':'btn-ghost'}" style="margin-top:10px;width:100%;justify-content:center" data-toggle="${s.n}">

        </button>
      </div>`;
    }).join("");
    grid.querySelectorAll("[data-toggle]").forEach(btn=>{
      btn.onclick = ()=>{

          <button class="del" data-del="${t.id}">✕</button>
        </div>`).join("");
      rowsEl.querySelectorAll("[data-id]").forEach(cb=>{

          saveTodos(user, todos);
          draw();
        };
      });
      rowsEl.querySelectorAll("[data-del]").forEach(b=>{
        b.onclick = ()=>{

          draw();
        };
      });
    }
    document.getElementById("addTodoBtn").onclick = ()=>{
      const inp = document.getElementById("newTodo");
      const v = inp.value.trim();
      if(!v) return;
      todos.unshift({id: String(Date.now()), text:v, done:false});
      saveTodos(user, todos);
      draw();
    };
    document.getElementById("newTodo").addEventListener("keydown", e=>{ if(e.key==="Enter") document.getElementById("addTodoBtn").click(); });
    document.getElementById("addCommon").onclick = ()=>{
      const common = settings.commonTodos;
      common.forEach(c=>{
        if(!todos.some(t=>t.text===c)) todos.unshift({id: String(Date.now())+Math.random(), text:c, done:false});
      });
      saveTodos(user, todos);
      draw();
    };
  }
}

/* ===================== REMINDERS ===================== */
let reminderChecker = null;
function startReminderChecker(user){
  if(reminderChecker) clearInterval(reminderChecker);
  reminderChecker = setInterval(()=>{
    const rems = getReminders(user);
    const now = new Date();
    const hm = pad2(now.getHours())+":"+pad2(now.getMinutes());
    const todayKey = todayISO();
    rems.forEach(r=>{
      if(r.enabled && r.time===hm && r.lastFired!==todayKey+"_"+hm){
        r.lastFired = todayKey+"_"+hm;
        toast("🔔 রিমাইন্ডার: "+r.text);
        if(window.Notification && Notification.permission==="granted"){
          try{ new Notification("Daily Tracker রিমাইন্ডার", {body:r.text}); }catch(e){}
        }
      }
    });
    saveReminders(user, rems);
  }, 20000);
}

  }
  startReminderChecker(user);

/* ===================== CHART HELPER ===================== */
function barChartHtml(items, opts){
  opts = opts || {};
  const max = opts.max || Math.max(1, ...items.map(i=>i.value));
  return `<div class="barchart">${items.map(i=>{
    const h = Math.max(2, Math.round((i.value/max)*100));
    return `<div class="bar" style="height:${h}%" title="${i.label}: ${Math.round(i.value)}"></div>`;
  }).join("")}</div>
  <div class="lbl">${items.map(i=>`<span>${i.label}</span>`).join("")}</div>`;
}
function scorePillHtml(score){
  const s = Math.round(score);
  const cls = s>=70?"hi":s>=40?"mid":"lo";
  return `<span class="score-pill ${cls}">${s}%</span>`;
}

/* ===================== 12-MONTH REPORT ===================== */
function renderYearly(root, user){
  const months = last12Months();
  const all = getRecords(user);
  const monthData = months.map(m=>{
    const daysInMonth = new Date(m.y, m.m+1, 0).getDate();
    let recs = [];
    for(let d=1; d<=daysInMonth; d++){
      const iso = m.y+"-"+pad2(m.m+1)+"-"+pad2(d);
      if(iso > todayISO()) continue;
      const rec = all[iso] ? mergeRecord(all[iso]) : null;
      if(rec) recs.push(rec);
    }
    const avg = recs.length ? recs.reduce((s,r)=>s+amolScore(r),0)/recs.length : 0;
    const prayerRate = recs.length ? (recs.reduce((s,r)=>s+PRAYERS.filter(p=>r.prayers[p.key].done).length,0)/(recs.length*5))*100 : 0;
    const pages = recs.reduce((s,r)=>s+(r.quran.pages||0),0);
    const studyMin = recs.reduce((s,r)=>s+(r.study.minutes||0),0);
    return {label:m.label, avg, prayerRate, pages, studyMin, daysLogged:recs.length};
  });

  const chartItems = monthData.map(m=>({label:m.label.split(" ")[0], value:m.avg}));
  const overallAvg = (monthData.filter(m=>m.daysLogged>0).reduce((s,m)=>s+m.avg,0) / Math.max(1,monthData.filter(m=>m.daysLogged>0).length));

  root.innerHTML = `
    <div class="page-head"><div><h1 class="page-title">১২ মাসের রিপোর্ট</h1><p class="page-sub">12-Month Report — বছরব্যাপী প্রবণতা</p></div></div>
    <div class="grid cols-3">
      <div class="stat-card"><div class="k">১২ মাসের গড় স্কোর</div><div class="v">${Math.round(overallAvg||0)}<small>/100</small></div></div>
      <div class="stat-card"><div class="k">সর্বোচ্চ মাস</div><div class="v" style="font-size:18px">${(monthData.slice().sort((a,b)=>b.avg-a.avg)[0]||{}).label||"-"}</div></div>
      <div class="stat-card"><div class="k">মোট রিপোর্ট করা দিন</div><div class="v">${monthData.reduce((s,m)=>s+m.daysLogged,0)}<small>দিন</small></div></div>
    </div>
    <div class="section-title"><h3>মাসিক গড় স্কোর প্রবণতা</h3><div class="line"></div></div>
    <div class="card">${barChartHtml(chartItems, {max:100})}</div>
    <div class="section-title"><h3>মাস অনুযায়ী বিস্তারিত</h3><div class="line"></div></div>
    <div class="card" style="overflow-x:auto">
      <table class="report">
        <thead><tr><th>মাস</th><th>রিপোর্ট করা দিন</th><th>নামাজের হার</th><th>মোট কোরআন পাতা</th><th>মোট পড়াশোনা</th><th>গড় স্কোর</th></tr></thead>
        <tbody>

      <div id="customRange" style="display:none;margin-top:14px" class="grid cols-2">
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--ink-600)">পিরিয়ড A</label>
          <div style="display:flex;gap:8px;margin-top:6px"><input type="date" id="aStart"><input type="date" id="aEnd"></div>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:var(--ink-600)">পিরিয়ড B</label>
          <div style="display:flex;gap:8px;margin-top:6px"><input type="date" id="bStart"><input type="date" id="bEnd"></div>
        </div>
        <button class="btn btn-primary btn-sm" id="runCustom" style="grid-column:span 2;width:fit-content">তুলনা করুন</button>
      </div>
    </div>
    <div id="compareBody" style="margin-top:16px"></div>
  `;

  function statsFor(startISO, endISO){
    let d = startISO, list = [];
    while(d<=endISO){ list.push(d); d = addDays(d,1); }
    const recs = list.map(x=> all[x] ? mergeRecord(all[x]) : emptyRecord());
    const n = recs.length || 1;
    return {
      label: fmtShort(startISO)+" – "+fmtShort(endISO),
      score: recs.reduce((s,r)=>s+amolScore(r),0)/n,
      prayerRate: (recs.reduce((s,r)=>s+PRAYERS.filter(p=>r.prayers[p.key].done).length,0)/(n*5))*100,
      pages: recs.reduce((s,r)=>s+(r.quran.pages||0),0),
      hadith: recs.reduce((s,r)=>s+(r.hadith.count||0),0),
      studyMin: recs.reduce((s,r)=>s+(r.study.minutes||0),0),
      duaCount: recs.reduce((s,r)=>s+(r.duas.count||0),0)
    };
  }
  function fmtShort(iso){ const d = parseISO(iso); return d.getDate()+" "+MONTH_NAMES[d.getMonth()]; }

  function deltaHtml(a,b,higherIsBetter){
    higherIsBetter = higherIsBetter!==false;
    if(a===b) return `<span class="delta flat">= কোনো পরিবর্তন নেই</span>`;
    const better = higherIsBetter ? b>a : b<a;
    const diff = a===0 ? (b>0?100:0) : Math.abs(((b-a)/Math.max(a,0.0001))*100);
    return `<span class="delta ${better?'up':'down'}">${better?'▲':'▼'} ${diff.toFixed(0)}%</span>`;
  }

  function renderCompareBody(sA, sB){
    const rows = [
      {label:"আমল স্কোর", a:sA.score, b:sB.score, fmt:v=>Math.round(v)+"/100"},
      {label:"নামাজ আদায়ের হার", a:sA.prayerRate, b:sB.prayerRate, fmt:v=>Math.round(v)+"%"},
      {label:"মোট কোরআন পাতা", a:sA.pages, b:sB.pages, fmt:v=>Math.round(v)},
      {label:"মোট হাদিস", a:sA.hadith, b:sB.hadith, fmt:v=>Math.round(v)},
      {label:"পড়াশোনা (মিনিট)", a:sA.studyMin, b:sB.studyMin, fmt:v=>Math.round(v)},
      {label:"দোয়া সম্পন্ন", a:sA.duaCount, b:sB.duaCount, fmt:v=>Math.round(v)}
    ];
    document.getElementById("compareBody").innerHTML = `
      <div class="compare-wrap">
        <div class="card compare-col"><h4>পিরিয়ড A: ${sA.label}</h4>
          ${rows.map(r=>`<div class="compare-row"><span>${r.label}</span><strong>${r.fmt(r.a)}</strong></div>`).join("")}
        </div>
        <div class="card compare-col"><h4>পিরিয়ড B: ${sB.label}</h4>
          ${rows.map(r=>`<div class="compare-row"><span>${r.label}</span><strong>${r.fmt(r.b)}</strong></div>`).join("")}
        </div>
      </div>
      <div class="section-title"><h3>পরিবর্তন</h3><div class="line"></div></div>
      <div class="card">
        ${rows.map(r=>`<div class="compare-row"><span>${r.label}</span>${deltaHtml(r.a,r.b)}</div>`).join("")}
      </div>
    `;
  }

  function runPreset(p){
    let sA, sB;
    if(p==="week"){
      const wkBStart = addDays(todayISO(), -6), wkBEnd = todayISO();
      const wkAStart = addDays(wkBStart, -7), wkAEnd = addDays(wkBStart, -1);
      sA = statsFor(wkAStart, wkAEnd); sB = statsFor(wkBStart, wkBEnd);
    } else if(p==="month"){
      const now = new Date();
      const thisStart = isoDate(new Date(now.getFullYear(), now.getMonth(), 1));
      const thisEnd = todayISO();
      const lastMonthEnd = addDays(thisStart, -1);
      const lastStart = isoDate(new Date(parseISO(lastMonthEnd).getFullYear(), parseISO(lastMonthEnd).getMonth(), 1));
      sA = statsFor(lastStart, lastMonthEnd); sB = statsFor(thisStart, thisEnd);
    }
    renderCompareBody(sA, sB);
  }
  runPreset("week");

  document.getElementById("presetPills").querySelectorAll("button").forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll("#presetPills button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      const p = b.dataset.p;
      document.getElementById("customRange").style.display = p==="custom" ? "grid" : "none";
      if(p!=="custom") runPreset(p);
    };
  });
  document.getElementById("runCustom").onclick = ()=>{
    const aS=document.getElementById("aStart").value, aE=document.getElementById("aEnd").value;
    const bS=document.getElementById("bStart").value, bE=document.getElementById("bEnd").value;
    if(!aS||!aE||!bS||!bE){ toast("সব তারিখ পূরণ করুন", true); return; }
    renderCompareBody(statsFor(aS,aE), statsFor(bS,bE));
  };
}

/* ===================== SETTINGS ===================== */
function renderSettings(root, user){
  const db = usersDB();
  const isGuest = !currentUsername();
  const profile = isGuest ? null : db[user];
  const settings = getSettings(user);

  function chipManagerHtml(id){
    return `<div class="chip-wrap" id="${id}"></div>
      <div class="add-inline" style="margin-top:10px">
        <input type="text" id="${id}_input" placeholder="নতুন আইটেম লিখে যোগ করুন...">

      </div>`;
  }

    ${isGuest ? `
    <div class="card" style="background:var(--gold-100);border:1px solid var(--gold-300);margin-bottom:16px">

    </div>` : ""}

    <div class="grid cols-2">
      <div class="card">
        <div class="section-title" style="margin-top:0"><h3>প্রোফাইল ও শহর</h3><div class="line"></div></div>
        ${isGuest ? `<div class="field"><label>নাম</label><input type="text" id="setName" value="Guest User" disabled></div>` :
          `<div class="field"><label>নাম</label><input type="text" id="setName" value="${profile.name||''}"></div>`}
        <div class="field"><label>শহর (নামাজের সময়ের জন্য) — তালিকা থেকে বাছুন বা নিজের শহর লিখুন</label>
          <input type="text" id="setCity" list="cityListOptions" value="${settings.city}">
          <datalist id="cityListOptions">${CITIES.map(c=>`<option value="${c}">`).join("")}</datalist>
        </div>
        <button class="btn btn-primary btn-sm" id="saveProfile">সংরক্ষণ করুন</button>
      </div>
      <div class="card">
        <div class="section-title" style="margin-top:0"><h3>পাসওয়ার্ড পরিবর্তন</h3><div class="line"></div></div>
        ${isGuest ? `<p class="auth-note">Guest মোডে পাসওয়ার্ড নেই। <a href="#/login" style="color:var(--green-700);font-weight:600">রেজিস্টার</a> করে অ্যাকাউন্ট তৈরি করুন।</p>` : `
        <div class="field"><label>বর্তমান পাসওয়ার্ড</label><input type="password" id="curPass"></div>
        <div class="field"><label>নতুন পাসওয়ার্ড</label><input type="password" id="newPass"></div>
        <button class="btn btn-ghost btn-sm" id="changePassBtn">পরিবর্তন করুন</button>`}
      </div>
    </div>

    <div class="section-title"><h3>📿 দোয়া ও 📗 কুরআন রুটিন কাস্টমাইজেশন</h3><div class="line"></div></div>
    <div class="grid cols-2">
      <div class="card">
        <strong>দোয়া সংগ্রহ</strong>
        <p style="font-size:13px;color:var(--ink-600)">আরবি ও বাংলা অর্থসহ দোয়া যোগ/বাদ দিন এবং দৈনিক চেকলিস্ট নিয়ন্ত্রণ করুন।</p>
        <a href="#/duas" class="btn btn-ghost btn-sm">📖 দোয়া সংগ্রহ খুলুন</a>
      </div>
      <div class="card">
        <strong>কুরআন রুটিন</strong>
        <p style="font-size:13px;color:var(--ink-600)">১১৪টি সূরা থেকে আপনার নিয়মিত তিলাওয়াতের রুটিন বাছাই করুন।</p>
        <a href="#/quran" class="btn btn-ghost btn-sm">📗 কুরআন রুটিন খুলুন</a>
      </div>
    </div>

    <div class="section-title"><h3>📚 হাদিস উৎস/বিষয়ের তালিকা</h3><div class="line"></div></div>
    <div class="card">${chipManagerHtml("chipHadith")}</div>

    <div class="section-title"><h3>📗 ইসলামিক সাহিত্যের বইয়ের তালিকা</h3><div class="line"></div></div>
    <div class="card">${chipManagerHtml("chipLiterature")}</div>

    <div class="section-title"><h3>🎓 পড়াশোনার বিষয়ের তালিকা</h3><div class="line"></div></div>
    <div class="card">${chipManagerHtml("chipStudy")}</div>

    <div class="section-title"><h3>✅ টু-ডু: সাধারণ কাজের তালিকা</h3><div class="line"></div></div>
    <div class="card">${chipManagerHtml("chipTodos")}</div>

    <div class="section-title"><h3>ডেটা ব্যাকআপ</h3><div class="line"></div></div>
    <div class="card">
      <p style="font-size:13px;color:var(--ink-600);margin-top:0">আপনার সব তথ্য শুধু এই ব্রাউজারে রয়েছে। ব্রাউজার ডেটা/ক্যাশ মুছে গেলে হারিয়ে যাবে — তাই নিয়মিত এক্সপোর্ট করে ফাইল সংরক্ষণ করুন।</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-gold btn-sm" id="exportBtn">⬇️ ডেটা এক্সপোর্ট করুন</button>
        <label class="btn btn-ghost btn-sm" style="cursor:pointer">⬆️ ডেটা ইমপোর্ট করুন<input type="file" id="importFile" accept=".json" style="display:none"></label>
      </div>
    </div>

    <div class="section-title"><h3>বিপজ্জনক অঞ্চল</h3><div class="line"></div></div>
    <div class="card">
      <button class="btn btn-danger btn-sm" id="deleteAllBtn">🗑️ এই অ্যাকাউন্টের সব ডেটা মুছে ফেলুন (রিপোর্ট, টু-ডু, সেটিংস)</button>
    </div>
  `;

  document.getElementById("saveProfile").onclick = ()=>{
    if(!isGuest){
      const name = document.getElementById("setName").value.trim();
      if(name){ db[user].name = name; saveUsersDB(db); }
    }
    settings.city = document.getElementById("setCity").value.trim() || "Dhaka";
    saveSettings(user, settings);
    toast("প্রোফাইল আপডেট হয়েছে ✓");
  };
  if(!isGuest){
    document.getElementById("changePassBtn").onclick = async ()=>{
      const cur = document.getElementById("curPass").value;
      const nw = document.getElementById("newPass").value;
      if(!cur||!nw){ toast("সব ঘর পূরণ করুন", true); return; }
      const h = await hashPass(cur, profile.salt);
      if(h!==profile.passHash){ toast("বর্তমান পাসওয়ার্ড ভুল", true); return; }
      if(nw.length<4){ toast("নতুন পাসওয়ার্ড কমপক্ষে ৪ অক্ষর হতে হবে", true); return; }
      const salt = randomSalt();
      profile.salt = salt;
      profile.passHash = await hashPass(nw, salt);
      saveUsersDB(db);
      toast("পাসওয়ার্ড পরিবর্তন হয়েছে ✓");
      document.getElementById("curPass").value=""; document.getElementById("newPass").value="";
    };
  }

  // generic chip-list manager wiring
  function wireChipManager(id, arrKey, placeholder){
    const wrap = document.getElementById(id);
    const inp = document.getElementById(id+"_input");
    inp.placeholder = placeholder;
    function drawChips(){
      const arr = settings[arrKey];
      if(!arr.length){ wrap.innerHTML = `<span class="empty" style="padding:6px 0">কোনো আইটেম নেই।</span>`; return; }
      wrap.innerHTML = arr.map((v,i)=>`<span class="chip">${v}<button data-rm="${i}" title="বাদ দিন">✕</button></span>`).join("");
      wrap.querySelectorAll("[data-rm]").forEach(btn=>{
        btn.onclick = ()=>{
          settings[arrKey].splice(Number(btn.dataset.rm),1);
          saveSettings(user, settings);
          drawChips();
        };
      });
    }
    drawChips();
    document.getElementById(id+"_add").onclick = ()=>{
      const v = inp.value.trim();
      if(!v) return;
      settings[arrKey].push(v);
      saveSettings(user, settings);
      inp.value="";
      drawChips();
    };
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter") document.getElementById(id+"_add").click(); });
  }
  wireChipManager("chipHadith","hadithSources","যেমনঃ সহীহ বুখারী");
  wireChipManager("chipLiterature","literatureTitles","যেমনঃ সীরাতুন্নবী");
  wireChipManager("chipStudy","studySubjects","যেমনঃ আরবি ব্যাকরণ");
  wireChipManager("chipTodos","commonTodos","যেমনঃ তাহাজ্জুদ নামাজ");

  document.getElementById("exportBtn").onclick = ()=>{
    const payload = {
      profile: {name: (profile&&profile.name)||"Guest", username: user},
      records: getRecords(user), todos: getTodos(user), reminders: getReminders(user), settings: getSettings(user),
      exportedAt: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "daily-tracker-"+user+"-"+todayISO()+".json";
    a.click();
    toast("ডেটা এক্সপোর্ট হয়েছে ✓");
  };
  document.getElementById("importFile").onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const data = JSON.parse(reader.result);
        if(data.records) saveRecords(user, data.records);
        if(data.todos) saveTodos(user, data.todos);
        if(data.reminders) saveReminders(user, data.reminders);
        if(data.settings) saveSettings(user, data.settings);
        toast("ডেটা ইমপোর্ট সম্পন্ন ✓");
        render();
      }catch(err){ toast("ফাইল পড়া যায়নি — সঠিক ফরম্যাট কিনা দেখুন", true); }
    };
    reader.readAsText(file);
  };
  document.getElementById("deleteAllBtn").onclick = ()=>{
    if(!confirm("আপনি কি নিশ্চিত? এই অ্যাকাউন্টের সব রিপোর্ট, টু-ডু, রিমাইন্ডার ও কাস্টম সেটিংস স্থায়ীভাবে মুছে যাবে।")) return;
    localStorage.removeItem(recKey(user));
    localStorage.removeItem(todoKey(user));
    localStorage.removeItem(remKey(user));
    localStorage.removeItem(setKey(user));
    toast("সব ডেটা মুছে ফেলা হয়েছে");
    location.hash = "#/dashboard";
    render();
  };
}

})();
